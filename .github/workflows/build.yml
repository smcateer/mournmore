name: Build Mournmore

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build fonts
        run: python scripts/build.py

      - name: Package fonts
        run: |
          cd dist
          zip -r ../mournmore-code.zip *.ttf
          cd ..

      - name: List generated files
        run: |
          ls -lh dist
          ls -lh mournmore-code.zip

      - uses: actions/upload-artifact@v5
        with:
          name: mournmore-code
          path: |
            dist/*.ttf
            mournmore-code.zip
          retention-days: 90
